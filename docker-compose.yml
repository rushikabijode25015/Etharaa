version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ethara_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ethara_password}
      POSTGRES_DB: ${POSTGRES_DB:-ethara_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ethara_user}:${POSTGRES_PASSWORD:-ethara_password}@db:5432/${POSTGRES_DB:-ethara_db}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:

