services:
  - type: web
    name: ethara-backend
    env: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethara-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"

  - type: web
    name: ethara-frontend
    env: static
    rootDir: frontend
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ethara-backend.onrender.com

databases:
  - name: ethara-db
    plan: free
    databaseName: ethara_db
    user: ethara_user
